

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtSpace LifeSpace</title>

<style>
:root{
  --primary: #d62f63;           /* Island pink */
  --primary-dark: #b91c4f;
  --text: #1a1a1a;
  --muted: #666;
  --bg: #f4f4f4;
  --card: #ffffff;
  --border: #e2e2e2;
  --yellow: #f2d21b;
}

* { box-sizing: border-box; }

body{
  margin:0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height:1.6;
  transition: all 0.3s ease;
}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:5px;
}

/* Accessibility Banner */
.accessibility-banner{
  background:transparent;
  border-bottom:3px solid var(--primary);
  text-align:center;
  padding:12px;
  color: #e7d213;
}

.toggle-buttons{
  margin-top:8px;
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s ease;
}

button:hover{
  background:var(--primary-dark);
}

/* Header */
header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0px 0;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo{
  font-size:1.4rem;
  font-weight:700;
  letter-spacing:1px;
   ;
}

nav ul{
  list-style:none;
  display:flex;
  gap:20px;
  padding:0;
  margin:0;
}

nav a{
  text-decoration:none;
  color:var(--text);
  font-weight:600;
}

nav a:hover{
  color:var(--primary);
}

/* Hero Section */
.hero{
  background:#fff;
  padding:10px 20px;
  text-align:center;
  border-radius:12px;
  margin:30px 0;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}
.hero2{
  
  padding:10px 20px;
  text-align:center;
  margin:30px 0;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  background-image: url('Pictures/LifespaceTotal.jpg');background-position: center;
}
.hero h1{
  margin:0;
  font-size:2rem;
}

.hero p{
  color:var(--muted);
  max-width:700px;
  margin:15px auto 0;
}

/* Venues */
.venues{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  margin-bottom:40px;
}

.venue{
  
  padding:25px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.venue h3{
  margin-top:0;
}

.venue p{
  color:var(--muted);
}

/* Enquiry Form */
.enquiry-form{
  background: rgb(141, 141, 141) ;
  opacity: 100%;
  padding:30px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
  border:1px solid var(--border);
}

.enquiry-form h2{
  margin-top:0;
}

form{
  display:grid;
  gap:15px;
}

label{
  font-weight:600;
}

input, select, textarea{
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:1rem;
}

input:focus, select:focus, textarea:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(214,47,99,0.2);
}

textarea{
  resize:vertical;
}

/* Chatbot */
.chatbot{
  position:fixed;
  bottom:25px;
  right:25px;
  background:var(--primary);
  color:white;
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.6rem;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.chatbot:hover{
  background:var(--primary-dark);
}

/* Footer */
footer{
  background:var(--yellow);
  padding:20px;
  text-align:center;
  font-weight:600;
}

/* Accessibility Modes */
.high-contrast{
  background:#000;
  color:#fff;
}

.high-contrast .venue,
.high-contrast .enquiry-form,
.high-contrast .hero{
  background:#000;
  border:1px solid #fff;
}

.large-text{
  font-size:1.2rem;
}

@media(max-width:768px){
  nav ul{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body style="background-image: url('Pictures/LifespaceTotal.jpg'); background-position: center;">

<div class="hero2">
<div class="accessibility-banner">
  <button disabled style="pointer-events: none;color: #e7d213;" >Need help? Use the chatbot or jump to the enquiry form.</button>
  <div class="toggle-buttons">
    <button style = "color: #e7d213;" id="increase-text">Increase Text Size</button>
    <button style = "color: #e7d213;" id="high-contrast">High Contrast Mode</button>
  </div>
</div>

<header style="background-color: rgba(231, 16, 116, 0.9);color:#e7d213;">
  <div class="container header-inner" >
    <div class="logo" ><img src="LifespaceLogo.PNG">ARTSPACE LIFESPACE</div>
    <nav >
      <ul >
        <li><a style ="color:#e7d213;" href="index.html">Home</a></li>
        <li><a style ="color:#e7d213;" href="Venues.html">Venues</a></li>
        <li><a style ="color:#e7d213;" href="Events.html">Events</a></li>
        <li><a style ="color:#e7d213;" href="Community.html">Community</a></li>
        <li><a style ="color:#e7d213;" href="#">Enquire</a></li>
      </ul>
    </nav>
  </div>
  
</header>
</div>

<div class="container">






</div>


<section id="enquire" class="enquiry-form">
  <h2 style = "color:#d62f63; padding: 2px 8px;">Booking Enquiry</h2>
  <form>
    <label style = "color:#d62f63; padding: 2px 8px;">Name</label>
    <input type="text" required>

    <label style = "color:#d62f63; padding: 2px 8px;">Email</label>
    <input type="email" required>

    <label style = "color:#d62f63; padding: 2px 8px;">Building</label>
    <select required>
      <option value="">Select a venue</option>
      <option>The Island</option>
      <option>Arts Mansion</option>
      <option>Sparks Bristol</option>
    </select>

    <label style = "color:#d62f63; padding: 2px 8px;" >Message</label>
    <textarea rows="5" required></textarea>

    <button type="submit">Submit Enquiry</button>
  </form>
</section>

<div class="chatbot" onclick="alert('Chatbot: How can I help today?')" aria-label="Open chatbot">💬</div>

<footer>
  Office open weekdays 10–4pm | 0117 3763 457 | info@artspacelifespace.org
</footer>

<script>
document.getElementById('high-contrast').addEventListener('click', function(){
  document.body.classList.toggle('high-contrast');
});

document.getElementById('increase-text').addEventListener('click', function(){
  document.body.classList.toggle('large-text');
});

function scrollToForm(){
  document.getElementById('enquire').scrollIntoView({behavior:'smooth'});
}

document.querySelector('form').addEventListener('submit', function(e){
  e.preventDefault();
  alert('Enquiry submitted successfully!');
});
</script>

</body>
</html>
