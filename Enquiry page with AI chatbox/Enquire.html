<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtSpace LifeSpace | Enquire</title>

<style>
:root{
  --primary:#d62f63;
  --primary-dark:#b91c4f;
  --text:#1a1a1a;
  --muted:#666;
  --bg:#f4f4f4;
  --card:#ffffff;
  --border:#e2e2e2;
  --yellow:#f2d21b;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  transition:all 0.3s ease;
}

.container{ max-width:1100px; margin:0 auto; padding:5px; }

.accessibility-banner{
  background:transparent;
  border-bottom:3px solid var(--primary);
  text-align:center;
  padding:12px;
  color:#e7d213;
}

.toggle-buttons{ margin-top:8px; }

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s ease;
}

button:hover{ background:var(--primary-dark); }

header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo{ font-size:1.4rem; font-weight:700; letter-spacing:1px; }
nav ul{ list-style:none; display:flex; gap:20px; padding:0; margin:0; }
nav a{ text-decoration:none; color:var(--text); font-weight:600; }
nav a:hover{ color:var(--primary); }

.hero2{
  padding:10px 20px;
  text-align:center;
  margin:30px 0;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  background-image:url('Pictures/LifespaceTotal.jpg');
  background-position:center;
}

/* Enquiry Form */
.enquiry-form{
  background:rgb(141,141,141);
  padding:30px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
  border:1px solid var(--border);
  max-width:800px;
  margin:30px auto;
  transition:border 0.3s ease;
}

.enquiry-form h2{ margin-top:0; }

form{
  display:grid;
  gap:15px;
}

label{ font-weight:600; }

input, select, textarea{
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:1rem;
}

input:focus, select:focus, textarea:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(214,47,99,0.2);
}

textarea{ resize:vertical; }

/* Status Message */
#status-message{
  display:none;
  padding:12px 16px;
  border-radius:8px;
  margin-top:12px;
  font-weight:600;
  text-align:center;
}

/* Chatbot launcher */
.chatbot{
  position:fixed;
  bottom:25px;
  right:25px;
  background:var(--primary);
  color:white;
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.6rem;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  z-index:1000;
}

.chatbot:hover{ background:var(--primary-dark); }

/* Chat Window */
#chat-window{
  position:fixed;
  bottom:100px;
  right:20px;
  width:320px;
  height:480px;
  background:#e7d213;
  border-radius:10px;
  box-shadow:0 5px 25px rgba(0,0,0,0.2);
  flex-direction:column;
  overflow:hidden;
  z-index:1001;
}

.chat-header{
  background:#d62f63;
  color:#fff;
  padding:15px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#chat-box{
  flex:1;
  padding:15px;
  overflow-y:auto;
  background:#e7d213;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.chat-input-area{
  padding:10px;
  border-top:1px solid #000;
  display:flex;
  gap:5px;
  background:#e7d213;
}

.chat-input-area input{
  flex:1;
  padding:8px;
  border:1px solid #000;
  border-radius:4px;
  background:#000;
  color:#e7d213;
  font-size:0.9em;
}

.chat-input-area button{ padding:8px 12px; font-size:0.9em; }

.message{ max-width:85%; padding:8px 12px; border-radius:15px; font-size:0.9em; }
.bot-msg{ background:#000; color:#e7d213; align-self:flex-start; }
.user-msg{ background:#000; color:#e71074; align-self:flex-end; }

.option-button{
  display:block;
  width:100%;
  background:#e71074;
  color:#e7d213;
  border:1px solid #e7d213;
  padding:6px;
  margin-top:5px;
  border-radius:4px;
  cursor:pointer;
  text-align:left;
  font-size:0.85em;
}

.option-button:hover{ background:#b91c4f; }

footer{ background:var(--yellow); padding:20px; text-align:center; font-weight:600; }

.high-contrast{ background:#000; color:#fff; }
.high-contrast .enquiry-form{ background:#000; border:1px solid #fff; }
.large-text{ font-size:1.2rem; }

@media(max-width:768px){
  nav ul{ flex-direction:column; text-align:center; }
}
</style>
</head>

<body style="background-image:url('Pictures/LifespaceTotal.jpg');background-position:center;">

<div class="hero2">
  <div class="accessibility-banner">
    <button disabled style="pointer-events:none;color:#e7d213;">Need help? Use the chatbot or jump to the enquiry form.</button>
    <div class="toggle-buttons">
      <button style="color:#e7d213;" id="increase-text">Increase Text Size</button>
      <button style="color:#e7d213;" id="high-contrast">High Contrast Mode</button>
    </div>
  </div>

  <header style="background-color:rgba(231,16,116,0.9);color:#e7d213;">
    <div class="container header-inner">
      <div class="logo"><img src="LifespaceLogo.PNG" alt="ArtSpace LifeSpace logo">ARTSPACE LIFESPACE</div>
      <nav>
        <ul>
          <li><a style="color:#e7d213;" href="index.html">Home</a></li>
          <li><a style="color:#e7d213;" href="Venues.html">Venues</a></li>
          <li><a style="color:#e7d213;" href="Events.html">Events</a></li>
          <li><a style="color:#e7d213;" href="Community.html">Community</a></li>
          <li><a style="color:#e7d213;" href="#">Enquire</a></li>
        </ul>
      </nav>
    </div>
  </header>
</div>

<!-- Enquiry Form -->
<section id="enquire" class="enquiry-form">
  <h2 style="color:#d62f63;padding:2px 8px;">Booking Enquiry</h2>
  <p style="color:#d62f63;padding:2px 8px;font-size:0.95em;">Fill in the form below or use the chatbot (bottom right) to book step by step.</p>

  <!-- Status message shown after submit -->
  <div id="status-message"></div>

  <form id="main-enquiry-form">
    <label style="color:#d62f63;padding:2px 8px;">Name</label>
    <input id="name" type="text" required placeholder="Your full name">

    <label style="color:#d62f63;padding:2px 8px;">Email</label>
    <input id="email" type="email" required placeholder="you@example.com">

    <label style="color:#d62f63;padding:2px 8px;">Building</label>
    <select id="building" required>
      <option value="">Select a venue</option>
      <option value="the-island">The Island</option>
      <option value="arts-mansion">Arts Mansion</option>
      <option value="sparks-bristol">Sparks Bristol</option>
    </select>

    <label style="color:#d62f63;padding:2px 8px;">Message</label>
    <textarea id="message" rows="5" required placeholder="Tell us about your event, expected attendees, preferred date..."></textarea>

    <button id="submit-btn" type="submit">Submit Enquiry</button>
  </form>
</section>

<!-- Chatbot Launcher -->
<div class="chatbot" onclick="toggleChat()" aria-label="Open chatbot">💬</div>

<!-- Chat Window -->
<div id="chat-window" style="display:none;">
  <div class="chat-header">
    <span>💬 ASLS Assistant</span>
    <span onclick="toggleChat()" style="cursor:pointer;font-size:1.1rem;">✕</span>
  </div>
  <div id="chat-box"></div>
  <div class="chat-input-area">
    <input id="user-chat-input" type="text" placeholder="Type a message...">
    <button onclick="processChat()">Send</button>
  </div>
</div>

<footer>
  Office open weekdays 10–4pm | 0117 3763 457 | info@artspacelifespace.org
</footer>

<script>
document.getElementById('high-contrast').addEventListener('click', function(){
  document.body.classList.toggle('high-contrast');
});

document.getElementById('increase-text').addEventListener('click', function(){
  document.body.classList.toggle('large-text');
});
</script>

<script src="chatbot.js"></script>

</body>
</html>
